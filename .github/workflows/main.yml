name: DevSecOps Purple Pipeline

on:
  push:
    branches: [ "principal", "main", "master" ]
  pull_request:
    branches: [ "principal", "main", "master" ]

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Application with Maven
        run: mvn clean install -DskipTests

      - name: Run Application in Background
        run: mvn spring-boot:run & sleep 60

      - name: RED TEAM - OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.7.0
        with:
          target: 'http://localhost:8080/api/users?id=1'
          fail_action: false

      - name: RED TEAM - SQLmap Offensive Scan
        run: |
          docker run --network="host" -t sqlmapproject/sqlmap -u "http://localhost:8080/api/users?id=1" --batch --level=3 --risk=1 --banner

      - name: BLUE TEAM & GRC - Audit Log Verification
        run: |
          echo "Verificando conformidade com a ISO 27001 e integridade dos logs..."
